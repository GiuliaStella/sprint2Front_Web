<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Camera</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>

<body>
    <div class="phone">


        <header class="ss-topbar">
            <a href="../index.html" class="intro-fechar">✕</a>
            <div class="retangulo-azul">🧠 Smart Study!</div>
            <div class="voltar-btn">⟳</div>
        </header>

        <div class="camera-visor">
            <!-- span para a lista de icones no topo -->
            <div class="camera-icones-topo">
                <span class="cam-icon">⊙</span>
                <span class="cam-icon">⚡</span>
                <span class="cam-icon">🚫</span>
                <span class="cam-icon zeiss">ZEISS</span>
                <span class="cam-icon">⊞</span>
                <span class="cam-icon">⚙</span>
            </div>
            <nav class="funcao-modos">
                <a href="digitalizar.html" class="funcao">📄 Digitalizar Texto</a>
                <a href="traduzir.html" class="funcao">🌐 Traduzir</a>
                <a href="math.html" class="funcao">📐 Resolver Math</a>
                <a href="resumir.html" class="funcao">📝 Resumir</a>
                <a href="quiz.html" class="funcao-quiz">🎯 Quiz</a>
            </nav>
        </div>


        <!-- zoom -->
        <div class="zoom-bar">
            <div class="zoom-btn">0.6</div>
            <div class="zoom-btn active">1.0</div>
            <div class="zoom-btn">2.0</div>
        </div>


        <!-- botao de galeria e de virar a camera -->
        <div class="controle-captura">
            <div class="btn-secundario1">🖼</div>
            <div class="btn-disparo">
                <div class="btn-disparo-interno"></div>
            </div>
            <div class="btn-secundario2">🔄</div>
        </div>

        <!-- navegador do android -->
        <nav class="android-nav">
            <span class="nav1-btn">☰</span>
            <span class="nav2-btn">○</span>
            <span class="nav3-btn">‹</span>
        </nav>
    </div> <!-- div phone -->
    <script src="src/js/script.js"></script>
</body>

</html>
