<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovi Camera</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <div class="phone">
        <!-- tela 1 camera principal -->
        <div class="camera-visor">
            <!-- span para a lista de icones no topo -->
            <div class="camera-icones-topo">
                <span class="cam-icon">⊙</span>
                <span class="cam-icon">⚡</span>
                <span class="cam-icon">🚫</span>
                <span class="cam-icon zeiss">ZEISS</span>
                <span class="cam-icon">⊞</span>
                <span class="cam-icon">⚙</span>
            </div>
            <a href="pages/intro.html" class="retangulo-azul">
                🧠 Experimente o Smart Study!
            </a>
        </div>


        <!-- zoom -->
        <div class="zoom-bar">
            <div class="zoom-btn">0.6</div>
            <div class="zoom-btn active">1.0</div>
            <div class="zoom-btn">2.0</div>
        </div>


        <!-- modos de captura -->
        <div class="modos">
            <span class="modo">Noite</span>
            <span class="modo">Retrato</span>
            <span class="modo active-mode">Foto</span>
            <span class="modo">Vídeo</span>
            <!-- clicando em smart study vai p introhtml -->
            <a href="pages/intro.html" class="modo ss-modo">Smart Study</a>
        </div>


        <!-- botao de galeria e de virar a camera -->
        <div class="controle-captura">
            <div class="btn-secundario1">🖼</div>
            <div class="btn-disparo">
                <div class="btn-disparo-interno"></div>
            </div>
            <div class="btn-secundario2">🔄</div>
        </div>

        <!-- navegador do android -->
        <nav class="android-nav">
            <span class="nav1-btn">☰</span>
            <span class="nav2-btn">○</span>
            <span class="nav3-btn">‹</span>
        </nav>
    </div> <!-- div phone -->
    <script src="src/js/script.js"></script>
</body>

</html>
